spring.application.name=backend
server.port=8080

# review destination email (where submissions are manually reviewed)
review.email.to=${REVIEW_EMAIL_TO:mankindminds4@gmail.com}

# multipart limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# SMTP configuration (example uses Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:mankindminds4@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google reCAPTCHA (v2/v3) server-side verification
captcha.enabled=true
captcha.verify-url=https://www.google.com/recaptcha/api/siteverify
captcha.secret-key=${CAPTCHA_SECRET_KEY:}
